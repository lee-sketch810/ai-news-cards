  .empty{color:var(--muted);font-size:14px;padding:32px 0;text-align:center}

</style>

<script>
(function(){
  var raw = document.getElementById('cards-json').textContent
            .replace(/\/\* CARDS_DATA_(START|END) \*\//g,'').trim();
  var data; try{ data = JSON.parse(raw); }catch(e){ data = {cards:[]}; }
  var cards = data.cards || [];
  var meta = document.getElementById('meta');
  if(data.date){ meta.textContent = data.date + ' · 발행일 검증 거친 AI 뉴스 ' + cards.length + '건'; }

  var esc = function(s){ var d=document.createElement('div'); d.textContent=s==null?'':s; return d.innerHTML; };
  var cats = [];
  cards.forEach(function(c){ if(c.category && cats.indexOf(c.category)<0) cats.push(c.category); });

  var active = '전체';
  var fbox = document.getElementById('filters');
  ['전체'].concat(cats).forEach(function(cat){
    var b=document.createElement('button');
    b.textContent=cat; b.setAttribute('aria-pressed', cat===active);
    b.onclick=function(){ active=cat;
      Array.prototype.forEach.call(fbox.children,function(x){x.setAttribute('aria-pressed',x.textContent===cat);});
      render(); };
    fbox.appendChild(b);
  });

  function vlabel(s){ return s==='passed' ? ['passed','당일 검증 통과'] : ['yesterday','발행일 '+'(전일) 검증']; }

  function render(){
    var box=document.getElementById('cards');
    var list = active==='전체' ? cards : cards.filter(function(c){return c.category===active;});
    if(!list.length){ box.innerHTML='<div class="empty">해당 카테고리의 뉴스가 없습니다.</div>'; return; }
    box.innerHTML = list.map(function(c){
      var pts=(c.points||[]).map(function(p){return '<li>'+esc(p)+'</li>';}).join('');
      var v=vlabel(c.verification_status);
      return '<article class="card">'
        +'<div class="card-top"><span class="cat">'+esc(c.category)+'</span>'
        +'<span class="date">'+esc(c.verified_date)+'</span></div>'
        +'<h2 class="headline">'+esc(c.headline)+'</h2>'
        +'<p class="summary">'+esc(c.summary)+'</p>'
        +'<ul class="points">'+pts+'</ul>'
        +'<div class="insight"><span class="label">왜 중요한가</span><p>'+esc(c.insight)+'</p></div>'
        +'<div class="card-foot">'
        +'<a href="'+esc(c.source_url)+'" target="_blank" rel="noopener">출처'+(c.source_name?' · '+esc(c.source_name):'')+'</a>'
        +'<span class="verify '+v[0]+'">'+v[1]+'</span></div>'
        +'</article>';
    }).join('');
  }
  render();
})();
</script>
