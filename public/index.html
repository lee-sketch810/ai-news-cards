      ],
      "insight": "AI 정책의 초점이 '개발 촉진'에서 '접근성 형평'으로 넓어지고 있다. 취약계층 정의를 계속 확장하는 방식은 AI 활용 격차가 소득이나 연령뿐 아니라 노동시장 지위에 따라서도 벌어질 수 있다는 문제의식을 반영한다.",

<script>
(function(){
  var EMBEDDED;
  try{
    EMBEDDED = JSON.parse(document.getElementById('cards-json').textContent
      .replace(/\/\* CARDS_DATA_(START|END) \*\//g,'').trim());
  }catch(e){ EMBEDDED = {date:"",cards:[]}; }

  var esc=function(s){var d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;};
  var WEEK=['일','월','화','수','목','금','토'];
  function fmtDate(iso){
    var p=(iso||'').split('-'); if(p.length!==3) return iso||'';
    var dt=new Date(+p[0],+p[1]-1,+p[2]);
    return p[0]+'년 '+(+p[1])+'월 '+(+p[2])+'일 ('+WEEK[dt.getDay()]+')';
  }

  var manifest={latest:EMBEDDED.date,editions:[]};
  var current=null;          // 현재 보고 있는 에디션 데이터
  var activeCat='전체';

  var elSub=document.getElementById('sub');
  var elBack=document.getElementById('backtoday');
  var elPrev=document.getElementById('prev');
  var elNext=document.getElementById('next');
  var elPick=document.getElementById('datepick');
  var elArchiveBtn=document.getElementById('toggle-archive');
  var elArchive=document.getElementById('archive');
  var elFilters=document.getElementById('filters');
  var elCards=document.getElementById('cards');
  var elDaily=document.getElementById('daily');

  function setDaily(data){
    var di=data.daily_insight;
    if(di && (di.title||di.body) && data.cards.length){
      elDaily.style.display='block';
      elDaily.innerHTML='<div class="d-label">오늘의 흐름</div>'
        +(di.title?'<h2>'+esc(di.title)+'</h2>':'')
        +(di.body?'<p>'+esc(di.body)+'</p>':'');
    } else { elDaily.style.display='none'; elDaily.innerHTML=''; }
  }

  function setHeader(data){
    var isLatest = data.date===manifest.latest;
    elSub.textContent = fmtDate(data.date) + ' · ' +
      (isLatest ? '오늘 꼭 알아야 할 AI 뉴스 ' : '그날의 AI 뉴스 ') + (data.cards.length);
    elBack.classList.toggle('show', !isLatest);
  }

  function renderCards(){
    var list=activeCat==='전체'?current.cards:current.cards.filter(function(c){return c.category===activeCat;});
    if(!current.cards.length){
      elCards.innerHTML='<div class="empty">이 날짜에는 발행된 뉴스가 없습니다.<br><a href="./">가장 최근 뉴스 보기</a></div>';
      return;
    }
    if(!list.length){ elCards.innerHTML='<div class="empty">이 카테고리의 뉴스가 없습니다.</div>'; return; }
    elCards.innerHTML=list.map(function(c){
      var pts=(c.points||[]).map(function(p){return '<li>'+esc(p)+'</li>';}).join('');
      var chips=(c.entities||[]).map(function(e){
        return '<button class="ent" data-ent="'+esc(e)+'">'+esc(e)+'</button>';}).join('');
      var multi=(c.sources&&c.sources.length>1);
      var badge=multi?'<span class="verify vv">✓✓ 교차검증</span>':'<span class="verify">✓ 출처·발행일 확인</span>';
      var thread=(c.thread_ids&&c.thread_ids[0])
        ?'<button class="ent" data-thread="'+esc(c.thread_ids[0])+'" style="border-color:var(--accent);color:var(--accent)">🧵 후속 소식 보기</button>':'';
      return '<article class="card">'
        +'<div class="card-top"><span class="cat">'+esc(c.category)+'</span>'
        +'<span class="date">'+esc(c.verified_date)+'</span></div>'
        +'<h2 class="headline">'+esc(c.headline)+'</h2>'
        +'<p class="summary">'+esc(c.summary)+'</p>'
        +'<ul class="points">'+pts+'</ul>'
        +'<div class="insight"><span class="label">왜 중요한가</span><p>'+esc(c.insight)+'</p></div>'
        +(chips||thread?'<div class="ents">'+chips+thread+'</div>':'')
        +'<div class="card-foot">'
        +'<a href="'+esc(c.source_url)+'" target="_blank" rel="noopener">출처'+(c.source_name?' · '+esc(c.source_name):'')+'</a>'
        +badge+'</div>'
        +'</article>';
    }).join('');
    [].forEach.call(elCards.querySelectorAll('[data-thread]'),function(b){
      b.onclick=function(){ goThread(b.dataset.thread); };});
    [].forEach.call(elCards.querySelectorAll('.ent[data-ent]'),function(b){
      b.onclick=function(){ goEntity(b.dataset.ent); };});
  }

  function buildFilters(){
    var cats=[]; current.cards.forEach(function(c){if(c.category&&cats.indexOf(c.category)<0)cats.push(c.category);});
    activeCat='전체';
    elFilters.innerHTML='';
    ['전체'].concat(cats).forEach(function(cat){
      var b=document.createElement('button');
      b.textContent=cat; b.setAttribute('aria-pressed',cat===activeCat);
      b.onclick=function(){activeCat=cat;
        [].forEach.call(elFilters.children,function(x){x.setAttribute('aria-pressed',x.textContent===cat);});
        renderCards();};
      elFilters.appendChild(b);
    });
  }

  function updateNav(date){
    var dates=manifest.editions.map(function(e){return e.date;}); // 최신순
    var i=dates.indexOf(date);
    elNext.disabled=!(i>0);                     // 더 최신 있음
    elPrev.disabled=!(i>=0&&i<dates.length-1);  // 더 과거 있음
    elNext.onclick=function(){ if(i>0) go(dates[i-1]); };
    elPrev.onclick=function(){ if(i>=0&&i<dates.length-1) go(dates[i+1]); };
    if(date) elPick.value=date;
    if(dates.length){ elPick.min=dates[dates.length-1]; elPick.max=dates[0]; }
  }

  function show(data){
    current=data; setHeader(data); setDaily(data); buildFilters(); renderCards(); updateNav(data.date);
    [].forEach.call(elArchive.querySelectorAll('a'),function(a){
      a.style.background=a.dataset.date===data.date?'var(--bg)':'';});
  }

  function go(date){
    if(!date) return;
    if(elView.classList.contains('show')) clearView();
    if(date===EMBEDDED.date){ history.pushState({},'', './'); show(EMBEDDED); return; }
    history.pushState({},'','?date='+date);
    fetch('data/cards-'+date+'.json').then(function(r){
      if(!r.ok) throw 0; return r.json();
    }).then(show).catch(function(){
      current={date:date,cards:[]}; setHeader(current); elFilters.innerHTML=''; renderCards(); updateNav(date);
    });
  }

  function buildArchive(){
    if(!manifest.editions.length){ elArchiveBtn.style.display='none'; return; }
    elArchive.innerHTML=manifest.editions.map(function(e){
      return '<a href="?date='+e.date+'" data-date="'+e.date+'">'
        +'<span class="a-date">'+fmtDate(e.date)+'</span>'
        +'<span class="a-head">'+esc(e.top_headline)+'</span>'
        +'<span class="a-cnt">'+e.count+'건</span></a>';
    }).join('');
    [].forEach.call(elArchive.querySelectorAll('a'),function(a){
      a.onclick=function(ev){ev.preventDefault();go(a.dataset.date);elArchive.classList.remove('show');elArchiveBtn.setAttribute('aria-expanded','false');};
    });
  }
  elArchiveBtn.onclick=function(){
    var open=elArchive.classList.toggle('show');
    elArchiveBtn.setAttribute('aria-expanded',open);
  };
  elPick.onchange=function(){ go(elPick.value); };
  window.onpopstate=function(){ start(); };

  function param(){ var m=location.search.match(/[?&]date=([0-9-]+)/); return m?m[1]:null; }

  function loadOverview(){
    var el=document.getElementById('overview');
    fetch('data/overview.json').then(function(r){return r.ok?r.json():null;}).then(function(o){
      if(!o || !(o.title||o.lead)){ return; }
      var themes=(o.themes||[]).map(function(t){
        return '<div class="o-theme"><span class="o-k">'+esc(t.k)+'</span>'
          +'<p class="o-v">'+esc(t.v)+'</p></div>';
      }).join('');
      el.innerHTML='<div><span class="o-label">전체 흐름 · 기간 종합</span>'
        +(o.period?'<span class="o-period">'+esc(o.period)+'</span>':'')+'</div>'
        +(o.title?'<h2>'+esc(o.title)+'</h2>':'')
        +(o.lead?'<p class="o-lead">'+esc(o.lead)+'</p>':'')+themes;
      el.style.display='block';
    }).catch(function(){});
  }

  // ---- 특수 뷰 (엔티티 타임라인 / 트렌드 / 검색 / 소개) ----
  var elView=document.getElementById('view');
  var elSearch=document.getElementById('search');
  var _cache={};
  function fetchJSON(name){
    return _cache[name]!==undefined ? Promise.resolve(_cache[name]) :
      fetch('data/'+name).then(function(r){return r.ok?r.json():null;})
        .then(function(j){_cache[name]=j;return j;}).catch(function(){return null;});
  }
  function clearView(){
    elView.classList.remove('show'); elView.innerHTML='';
    elCards.style.display=''; elFilters.style.display='';
    var ov=document.getElementById('overview'); ov.style.display=ov.innerHTML.trim()?'block':'none';
  }
  function enterView(html){
    elDaily.style.display='none'; elFilters.style.display='none'; elCards.style.display='none';
    document.getElementById('overview').style.display='none';
    elView.innerHTML=html; elView.classList.add('show'); window.scrollTo(0,0); wireView();
  }
  function exitView(){
    if(/[?&](entity|view|q)=/.test(location.search)) history.pushState({},'','./');
    clearView(); if(current) show(current);
  }
  function wireView(){
    [].forEach.call(elView.querySelectorAll('[data-back]'),function(b){b.onclick=exitView;});
    [].forEach.call(elView.querySelectorAll('[data-ent]'),function(b){b.onclick=function(){goEntity(b.dataset.ent);};});
    [].forEach.call(elView.querySelectorAll('.sr a[data-date]'),function(a){
      a.onclick=function(ev){ev.preventDefault();var dt=a.dataset.date;clearView();history.pushState({},'','./');go(dt);};});
  }
  function backBtn(){ return '<button class="ent" data-back="1" style="margin-bottom:12px">← 뉴스로</button>'; }

  function goEntity(name){
    history.pushState({},'','?entity='+encodeURIComponent(name));
    fetchJSON('entities.json').then(function(o){
      var items=(o&&o.timelines&&o.timelines[name])||[];
      var rows=items.map(function(it){
        return '<a href="'+esc(it.url)+'" target="_blank" rel="noopener">'
          +'<div class="t-top"><span class="t-cat">'+esc(it.category)+'</span>'
          +'<span class="t-date">'+esc(it.date)+'</span></div>'
          +'<div class="t-head">'+esc(it.headline)+'</div></a>';}).join('');
      enterView(backBtn()+'<h2 class="v-title">'+esc(name)+' 타임라인</h2>'
        +'<p class="v-sub">이 주제로 확인된 소식 '+items.length+'건 · 최신순</p>'
        +'<div class="tl">'+(rows||'<div class="empty">해당 소식이 없습니다.</div>')+'</div>');
    });
  }
  function showTrends(){
    history.pushState({},'','?view=trends');
    fetchJSON('trends.json').then(function(t){
      if(!t){ enterView(backBtn()+'<div class="empty">트렌드 데이터가 없습니다.</div>'); return; }
      var cats=t.by_category||{};
      var max=Math.max.apply(null,Object.keys(cats).map(function(k){return cats[k];}).concat([1]));
      var bars=Object.keys(cats).map(function(k){
        return '<div class="bar-row"><span class="b-lab">'+esc(k)+'</span>'
          +'<span class="b-track"><span class="b-fill" style="width:'+Math.round(cats[k]/max*100)+'%"></span></span>'
          +'<span class="b-val">'+cats[k]+'</span></div>';}).join('');
      var ents=(t.top_entities||[]).map(function(e){
        return '<button class="rank-chip" data-ent="'+esc(e.name)+'">'+esc(e.name)+' <b>'+e.count+'</b></button>';}).join('');
      enterView(backBtn()+'<h2 class="v-title">주간 트렌드</h2>'
        +'<p class="v-sub">'+esc(t.period)+' · 카드 '+t.total_cards+'건 / '+t.total_editions+'일</p>'
        +'<div style="margin-bottom:18px">'+bars+'</div>'
        +'<p class="v-sub" style="margin:0 0 8px">가장 자주 등장한 기업·모델 (클릭 시 타임라인)</p>'
        +'<div>'+ents+'</div>');
    });
  }
  function showThreads(){
    history.pushState({},'','?view=threads');
    fetchJSON('threads.json').then(function(o){
      var threads=(o&&o.threads)||[];
      if(!threads.length){ enterView(backBtn()+'<div class="empty">아직 후속 소식으로 이어진 주제가 없습니다.</div>'); return; }
      var rows=threads.map(function(t){
        return '<button class="rank-chip" data-thread="'+esc(t.id)+'" style="display:block;width:100%;text-align:left;margin:0 0 8px">'
          +esc(t.label)+' <b>'+t.count+'건</b>'
          +'<span style="display:block;font-size:11.5px;color:var(--hint);margin-top:2px">'
          +esc(t.first_seen)+' → '+esc(t.last_seen)+'</span></button>';
      }).join('');
      enterView(backBtn()+'<h2 class="v-title">후속 소식</h2>'
        +'<p class="v-sub">여러 날에 걸쳐 계속 보도된 주제 '+threads.length+'건 · 클릭하면 진행 순서대로</p>'
        +rows);
      [].forEach.call(elView.querySelectorAll('[data-thread]'),function(b){
        b.onclick=function(){ goThread(b.dataset.thread); };});
    });
  }
  function goThread(id){
    history.pushState({},'','?thread='+encodeURIComponent(id));
    fetchJSON('threads.json').then(function(o){
      var t=((o&&o.threads)||[]).find(function(x){return x.id===id;});
      if(!t){ enterView(backBtn()+'<div class="empty">해당 이야기를 찾을 수 없습니다.</div>'); return; }
      var rows=t.entries.map(function(it,i){
        return '<a href="'+esc(it.url)+'" target="_blank" rel="noopener">'
          +'<div class="t-top"><span class="t-cat">'+(i+1)+'화 · '+esc(it.category)+'</span>'
          +'<span class="t-date">'+esc(it.date)+'</span></div>'
          +'<div class="t-head">'+esc(it.headline)+'</div>'
          +'<p class="t-sum">'+esc(it.summary)+'</p></a>';
      }).join('');
      enterView(backBtn()+'<h2 class="v-title">'+esc(t.label)+'</h2>'
        +'<p class="v-sub">'+esc(t.first_seen)+' ~ '+esc(t.last_seen)+' · 총 '+t.count+'건 · 오래된 순</p>'
        +'<div class="tl">'+rows+'</div>');
    });
  }
  function doSearch(q){
    q=(q||'').trim();
    if(!q){ if(elView.classList.contains('show')) exitView(); return; }
    history.replaceState({},'','?q='+encodeURIComponent(q));
    fetchJSON('search-index.json').then(function(idx){
      idx=idx||[]; var ql=q.toLowerCase();
      var hits=idx.filter(function(c){
        return (c.headline+' '+c.summary+' '+c.insight+' '+(c.entities||[]).join(' ')+' '+c.category).toLowerCase().indexOf(ql)>=0;});
      var rows=hits.map(function(c){
        return '<a href="?date='+c.date+'" data-date="'+c.date+'">'
          +'<div class="t-top"><span class="t-cat">'+esc(c.category)+'</span><span class="t-date">'+esc(c.date)+'</span></div>'
          +'<div class="t-head">'+esc(c.headline)+'</div><p class="t-sum">'+esc(c.summary)+'</p></a>';}).join('');
      enterView(backBtn()+'<h2 class="v-title">"'+esc(q)+'" 검색</h2>'
        +'<p class="v-sub">'+hits.length+'건 · 최신순</p>'
        +'<div class="sr">'+(rows||'<div class="empty">검색 결과가 없습니다.</div>')+'</div>');
      elSearch.value=q;
    });
  }
  function showAbout(){
    history.pushState({},'','?view=about');
    enterView(backBtn()+'<h2 class="v-title">이 사이트는 어떻게 만드나요?</h2>'
      +'<div class="about">'
      +'<p>매일 아침, 웹에서 수집한 AI 뉴스 후보를 <b>기사 발행일 검증</b>을 거쳐 그날(또는 전일) 소식만 골라 싣습니다.</p>'
      +'<ul>'
      +'<li><b>발행일 검증</b> — 각 기사의 발행 시각 메타데이터를 확인해 오래된 기사를 걸러냅니다. 날짜는 상대표현 없이 절대 발행일로만 표기합니다.</li>'
      +'<li><b>선별</b> — 중요도·실용성·관련성 점수로 상위 항목만, 카테고리 균형을 맞춰 고릅니다.</li>'
      +'<li><b>3단 인사이트</b> — 카드별 "왜 중요한가", 일별 "오늘의 흐름", 기간 전체 "전체 흐름".</li>'
      +'<li><b>출처 공개</b> — 모든 카드에 원문 링크를 답니다. 2개 이상 출처로 확인되면 ✓✓ 교차검증 배지가 붙습니다.</li>'
      +'</ul>'
      +'<p>카테고리는 주제 기준 6종입니다: 모델·연구 / 에이전트·자동화 / 도구·개발 / 교육·생산성 / 산업·투자 / 정책·규제.</p>'
      +'</div>');
  }

  document.getElementById('btn-trends').onclick=showTrends;
  document.getElementById('btn-threads').onclick=showThreads;
  document.getElementById('btn-about').onclick=showAbout;
  var _sto=null;
  elSearch.oninput=function(){ clearTimeout(_sto); var v=elSearch.value; _sto=setTimeout(function(){doSearch(v);},250); };

  function applyViewParam(){
    var m;
    if((m=location.search.match(/[?&]entity=([^&]+)/))){ goEntity(decodeURIComponent(m[1])); return true; }
    if((m=location.search.match(/[?&]view=(trends|threads|about)/))){
      ({trends:showTrends,threads:showThreads,about:showAbout})[m[1]](); return true; }
    if((m=location.search.match(/[?&]thread=([^&]+)/))){ goThread(decodeURIComponent(m[1])); return true; }
    if((m=location.search.match(/[?&]q=([^&]+)/))){ elSearch.value=decodeURIComponent(m[1]); doSearch(elSearch.value); return true; }
    return false;
  }

  var knownLatest=null;
  function checkForUpdates(){
    fetch('data/index.json',{cache:'no-store'}).then(function(r){return r.ok?r.json():null;})
      .then(function(m){
        if(!m || !m.latest || !knownLatest) return;
        if(m.latest>knownLatest){ document.getElementById('update-banner').classList.add('show'); }
      }).catch(function(){});
  }
  document.getElementById('btn-refresh').onclick=function(){ location.reload(); };

  function start(){
    if(EMBEDDED.cards.length){ show(EMBEDDED); }       // 임베드 최신 즉시 표시
    fetch('data/index.json').then(function(r){return r.ok?r.json():null;}).then(function(m){
      if(m){ manifest=m; buildArchive(); }
      knownLatest=(manifest&&manifest.latest)||EMBEDDED.date||null;
      var d=param();
      if(d && d!==EMBEDDED.date){ go(d); }
      else { updateNav(EMBEDDED.date||manifest.latest); if(!EMBEDDED.cards.length && manifest.latest) go(manifest.latest); }
      applyViewParam();
      setInterval(checkForUpdates, 180000);   // 3분마다 새 에디션 여부 확인
    }).catch(function(){ if(EMBEDDED.cards.length) updateNav(EMBEDDED.date); });
  }
  start();
  loadOverview();
})();
</script>
</body>
</html>
